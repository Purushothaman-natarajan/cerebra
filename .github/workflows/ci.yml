# CI/CD Pipeline — Ready for use when you enable GitHub Actions
#
# Uncomment the `on:` block below to activate automatic runs on push/PR to main.
# Runs backend tests, frontend build, and Docker smoke test.
#
# Required secrets (set in GitHub repo → Settings → Secrets and variables → Actions):
#   No secrets needed — tests use SQLite and skip Gemini-dependent tests.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run python -m pytest tests/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          GEMINI_API_KEY: ""

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check + build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Smoke test — start services
        run: |
          docker compose up -d
          sleep 15
          curl -sf http://localhost:8000/health || exit 1
          curl -sf http://localhost:5173/ || exit 1
          docker compose down
