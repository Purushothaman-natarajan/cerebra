# Dependabot configuration — restricted to monthly backend Python scans only.
# Frontend npm, Docker, and GitHub Actions updates are done manually.
# See https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels: ["dependencies", "python"]
