# See https://pre-commit.com for documentation
# See https://pre-commit.ci for CI integration
ci:
  autofix_commit_msg: "chore: auto-format [pre-commit.ci]"
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
  autoupdate_schedule: monthly
  submodules: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "\.md$"
      - id: end-of-file-fixer
        exclude: "\.md$"
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown, css, javascript, typescript]
        args: [--print-width=100, --prose-wrap=always]
        exclude: "node_modules/|dist/|package-lock.json"

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ["--skip=node_modules,dist,.venv,*.lock", "--ignore-words-list=cerebra"]
